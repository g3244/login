<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <div class="box">
        <form>
            <h3 class="login" align="center">Login</h3>
        <div class="div-user">
            <input type="text" id="txt1" class="user" required>
            <label for="txt1" class="label1">User name </label>
        </div>
        <div class="div-email">
            <input type="text" id="txt2" class="email" required>
            <label for="txt2" class="label2">Email</label>
        </div>
        <div class="div-pass">
            <input type="password" id="txt3" class="pass" autocomplete="new-password" required>
            <label for="txt3" class="label3">Password</label>
        </div>
            <div>
                <a href="">Forgot password?</a><br>
                <center>
                    <br><input type="submit" value="login" class="btn">
                </center>
            </div>
        </form>
    </div>
</body>
</html>
